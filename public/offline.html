<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#03081F" />
    <title>البرق السريع | Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f9fafb, #eef2ff);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: #03081f;
      }
      .card {
        width: min(92vw, 520px);
        padding: 28px;
        border-radius: 20px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(3, 8, 31, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.35rem, 3vw, 1.9rem);
      }
      p {
        margin: 0 0 18px;
        line-height: 1.6;
        color: #334155;
      }
      .btn {
        display: inline-block;
        border: 0;
        border-radius: 12px;
        padding: 10px 16px;
        background: #ff6b2c;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>البرق السريع needs an internet connection for fresh data. Once you are back online, reload to continue.</p>
      <a class="btn" href="/">Try again</a>
    </main>
  </body>
</html>
